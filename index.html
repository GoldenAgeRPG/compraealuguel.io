<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de Propriedades Zenin - JJK RPG</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=Roboto+Mono:wght@400;700&family=Yuji+Syuku&family=Cinzel:wght@700&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0c0c1a; --panel: #13141c; --muted: #bfc6e6; --accent1: #d4af37; --highlight: #f2e3a1; --text: #e7e9ff; --ui: 'Inter', system-ui, sans-serif; --title: 'Yuji Syuku', serif; --mono: 'Roboto Mono', monospace; --glass: rgba(255, 255, 255, 0.03); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--ui); background-color: var(--bg); color: var(--text); line-height: 1.6; padding: 20px; min-height: 100vh; overflow-x: hidden; }
    .container { max-width: 900px; margin: 0 auto; }
    #form-container { background: var(--panel); border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.1); padding: 20px; margin-bottom: 20px; }
    #output-container { background: var(--panel); border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.1); padding: 20px; }
    fieldset { border: 1px solid var(--glass); border-radius: 8px; padding: 15px; margin-bottom: 20px; }
    legend { font-family: var(--title); font-size: 1.5em; color: var(--accent1); padding: 0 10px; margin-left: 10px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .input-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
    label { font-weight: 500; font-size: 11px; color: var(--muted); text-transform: uppercase; font-family: var(--mono); }
    input, textarea, select { background: var(--bg); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 6px; padding: 10px; color: var(--text); font-family: var(--ui); font-size: 14px; width: 100%; }
    textarea { min-height: 80px; resize: vertical; }
    .topics-area { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 6px; }
    .modules-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 10px; }
    .module-card { background: var(--glass); padding: 15px; border-radius: 8px; border: 1px solid transparent; transition: 0.3s; }
    .module-card.active { border-color: var(--accent1); background: rgba(212, 175, 55, 0.05); }
    .module-header { display: flex; align-items: center; gap: 10px; cursor: pointer; margin-bottom: 10px; }
    .module-header input { width: auto; }
    .module-info { flex-grow: 1; display: flex; justify-content: space-between; font-size: 14px; }
    .module-fields { display: none; flex-direction: column; gap: 10px; margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; }
    .module-card.active .module-fields { display: flex; }
    .category-label { margin-top: 25px; color: var(--accent1); font-weight: bold; font-size: 0.9em; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; font-family: var(--title); text-transform: uppercase; }
    .total-box { background: rgba(212, 175, 55, 0.1); border: 1px solid var(--accent1); padding: 15px; border-radius: 8px; text-align: center; margin-top: 20px; }
    .total-value { font-family: var(--mono); font-size: 1.5em; color: var(--accent1); }
    #output-code { width: 100%; height: 150px; background: var(--bg); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; padding: 15px; color: var(--muted); font-family: var(--mono); font-size: 12px; resize: vertical; margin-bottom: 10px; }
    #copy-btn { width: 100%; padding: 12px; border: none; border-radius: 8px; background: var(--accent1); color: #000; font-size: 1em; font-family: var(--ui); font-weight: 700; cursor: pointer; transition: 0.2s; }
    #copy-btn:hover { background: #fff; }
    @media (max-width: 600px) { .topics-area { grid-template-columns: 1fr; } .modules-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <div id="form-container">
      <fieldset>
        <legend>Dados do Comprador</legend>
        <div class="grid-2">
          <div class="input-group"><label>Jogador</label><input type="text" id="f-jogador" placeholder="Nick"></div>
          <div class="input-group"><label>Personagem</label><input type="text" id="f-personagem" placeholder="Nome"></div>
        </div>
      </fieldset>
      <fieldset>
        <legend>Propriedade</legend>
        <div class="grid-2">
          <div class="input-group">
            <label>Transação</label>
            <select id="f-transacao"><option value="compra">Compra Definitiva</option><option value="aluguel">Aluguel Semanal</option></select>
          </div>
          <div class="input-group">
            <label>Tipo de Imóvel</label>
            <select id="f-imovel">
              <option value="esconderijo" data-buy="500000" data-rent="20000" data-topics="1">Esconderijo (1 Tópico Único)</option>
              <option value="apartamento" data-buy="5000000" data-rent="100000" data-topics="3">Apartamento (3 Tópicos)</option>
              <option value="residencia" data-buy="20000000" data-rent="400000" data-topics="6">Residência (2 Andares - 6 Tópicos)</option>
              <option value="complexo" data-buy="100000000" data-rent="1000000" data-topics="12">Complexo (4 Alas - 12 Tópicos)</option>
            </select>
          </div>
        </div>
        <div class="grid-2">
            <div class="input-group"><label>Nome da Propriedade</label><input type="text" id="f-nome-prop" placeholder="Ex: Mansão Zen'in"></div>
            <div class="input-group"><label>Localização Geral</label><input type="text" id="f-local" placeholder="Ex: Kyoto"></div>
        </div>
        <div id="topics-setup">
          <label style="margin-top:10px; display:block;">Nomear Tópicos/Áreas:</label>
          <div id="topics-list" class="topics-area"></div>
        </div>
      </fieldset>
      <fieldset>
        <legend>Módulos & Instalações</legend>
        <div id="modules-container" class="modules-grid"></div>
        <div class="input-group" style="margin-top: 20px;">
            <label>Observações Adicionais</label>
            <textarea id="f-obs" placeholder="Notas para o pedido..."></textarea>
        </div>
      </fieldset>
      <div class="total-box"><h4>TOTAL</h4><div id="total-display" class="total-value">¥ 0</div></div>
    </div>
    <div id="output-container">
      <textarea id="output-code" readonly></textarea>
      <button id="copy-btn">Copiar Pedido Completo</button>
    </div>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const modulesData = {
        "Essenciais & Conforto": [
          { name: "Quarto Simples", cost: 50000, kanji: "寝", sub: "Repouso Básico" },
          { name: "Suíte Master", cost: 300000, kanji: "室", sub: "Aposentos de Luxo" },
          { name: "Cozinha Básica", cost: 100000, kanji: "食", sub: "Refeitório" },
          { name: "Cozinha Gourmet", cost: 400000, kanji: "宴", sub: "Culinária de Elite" },
          { name: "Onsen", cost: 1500000, kanji: "湯", sub: "Purificação Termal" }
        ],
        "Treino & Estudos": [
          { name: "Dojo Marcial", cost: 400000, kanji: "武", sub: "Aperfeiçoamento Físico" },
          { name: "Sala de Meditação", cost: 400000, kanji: "禅", sub: "Foco Espiritual" },
          { name: "Biblioteca Oculta", cost: 300000, kanji: "書", sub: "Conhecimento Proibido" },
          { name: "Sala de Estudos", cost: 200000, kanji: "学", sub: "Intelecto Acadêmico" },
          { name: "Campo de Tiro", cost: 600000, kanji: "標", sub: "Precisão Balística" },
          { name: "Jardim de Ervas", cost: 300000, kanji: "草", sub: "Cultivo Botânico" }
        ],
        "Ofício & Suporte": [
          { name: "Oficina / Ateliê", cost: 600000, kanji: "工", sub: "Criação de Ferramentas" },
          { name: "Laboratório", cost: 1000000, kanji: "薬", sub: "Alquimia e Pesquisa" },
          { name: "Enfermaria", cost: 800000, kanji: "癒", sub: "Tratamento de Feridas" },
          { name: "Garagem", cost: 200000, kanji: "車", sub: "Logística Veicular" },
          { name: "Gerador Autônomo", cost: 500000, kanji: "電", sub: "Independência Energética" }
        ],
        "Segurança & Contenção": [
          { name: "Arsenal Seguro", cost: 200000, kanji: "兵", sub: "Estoque de Armamento" },
          { name: "Sala de Vigilância", cost: 400000, kanji: "眼", sub: "Monitoramento Constante" },
          { name: "Quarto do Pânico", cost: 1000000, kanji: "守", sub: "Fortaleza Final" },
          { name: "Rota de Fuga", cost: 300000, kanji: "遁", sub: "Evasão Estratégica" }
        ]
      };

      const container = document.getElementById('modules-container');
      const topicsList = document.getElementById('topics-list');
      const imovelSelect = document.getElementById('f-imovel');

      function updateTopicsInputs() {
        const count = parseInt(imovelSelect.options[imovelSelect.selectedIndex].getAttribute('data-topics'));
        topicsList.innerHTML = '';
        for(let i=1; i<=count; i++) {
          const div = document.createElement('div');
          div.className = 'input-group';
          div.innerHTML = `<label>Tópico ${i}</label><input type="text" class="topic-name-input" placeholder="Nome da Área" value="Área ${i}">`;
          topicsList.appendChild(div);
        }
        updateModuleSelects();
      }

      function updateModuleSelects() {
        const topicInputs = document.querySelectorAll('.topic-name-input');
        const selects = document.querySelectorAll('.mod-topic-select');
        selects.forEach(select => {
          const currentVal = select.value;
          select.innerHTML = '';
          topicInputs.forEach(input => {
            const opt = document.createElement('option');
            opt.value = input.value;
            opt.textContent = input.value;
            select.appendChild(opt);
          });
          select.value = currentVal || topicInputs[0]?.value;
        });
      }

      for (const [category, items] of Object.entries(modulesData)) {
          const catHeader = document.createElement('div');
          catHeader.className = 'category-label';
          catHeader.textContent = category;
          container.appendChild(catHeader);
          items.forEach((mod, idx) => {
              const card = document.createElement('div');
              card.className = 'module-card';
              card.innerHTML = `
                <div class="module-header">
                  <input type="checkbox" class="mod-check" data-name="${mod.name}" data-cost="${mod.cost}" data-kanji="${mod.kanji}" data-sub-def="${mod.sub}">
                  <div class="module-info"><span>${mod.name}</span><span>¥${mod.cost.toLocaleString('pt-BR')}</span></div>
                </div>
                <div class="module-fields">
                  <label>Alocar em qual Tópico:</label>
                  <select class="mod-topic-select"></select>
                  <input type="text" class="mod-sub" placeholder="Subtítulo">
                  <input type="text" class="mod-img" placeholder="URL da Imagem">
                  <textarea class="mod-desc" placeholder="Descrição narrativa..."></textarea>
                </div>`;
              card.querySelector('.mod-check').addEventListener('change', function() {
                  card.classList.toggle('active', this.checked);
                  updateLogic();
              });
              container.appendChild(card);
          });
      }

      function updateLogic() {
          const imovel = document.getElementById('f-imovel');
          const trans = document.getElementById('f-transacao');
          const cost = parseInt(trans.value === 'aluguel' ? imovel.options[imovel.selectedIndex].getAttribute('data-rent') : imovel.options[imovel.selectedIndex].getAttribute('data-buy'));
          let modCost = 0, modHTML = "", spoilersHTML = "";
          
          document.querySelectorAll('.module-card.active').forEach(card => {
              const cb = card.querySelector('.mod-check');
              const name = cb.getAttribute('data-name');
              const sub = card.querySelector('.mod-sub').value || cb.getAttribute('data-sub-def');
              const img = card.querySelector('.mod-img').value || 'https://i.imgur.com/YUtp3HN.png';
              const desc = card.querySelector('.mod-desc').value || 'Sem descrição narrativa.';
              const topic = card.querySelector('.mod-topic-select').value;
              
              modCost += parseInt(cb.getAttribute('data-cost'));
              modHTML += `• <b>${name}</b> (Tópico: <i>${topic}</i>)<br>`;
              spoilersHTML += `[spoiler="CÓDIGO: ${name.toUpperCase()} (${topic.toUpperCase()})"][code]<link href="https://goldenagerpg.github.io/templates.io/moradias.css" rel="stylesheet" type="text/css"><div class="zenin-wrapper"><div class="zenin-header"><img src="${img}" class="zenin-header-img"><div class="zenin-title-overlay"><h1 class="zenin-title">${name}</h1><div class="zenin-subtitle">${sub}</div></div></div><div class="zenin-content"><div class="zenin-kanji">${cb.getAttribute('data-kanji')}</div><div class="zenin-desc"><p>${desc}</p></div></div></div>[/code][/spoiler]`;
          });
          
          document.getElementById('total-display').textContent = "¥ " + (cost + modCost).toLocaleString('pt-BR');
          generateCode(imovel.options[imovel.selectedIndex].text, trans.value, modHTML, (cost + modCost).toLocaleString('pt-BR'), spoilersHTML);
      }

      function generateCode(imovelName, transType, modHTML, totalVal, spoilers) {
          const jog = document.getElementById('f-jogador').value || '---', per = document.getElementById('f-personagem').value || '---', prop = document.getElementById('f-nome-prop').value || '---', loc = document.getElementById('f-local').value || '---', obs = document.getElementById('f-obs').value;
          let topicListHTML = "";
          document.querySelectorAll('.topic-name-input').forEach(i => topicListHTML += `• ${i.value}<br>`);
          
          const pedidoBase = `<link href="https://gaaaaaaaaabs.github.io/goldenagerepositor.io/combate.css" rel="stylesheet" type="text/css"><div class="combat-container" style="display:block;width:100%;"><div class="combat-header" style="min-height:120px;padding:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;"><div class="combat-header-content" style="position:relative;z-index:5;"><h1 style="font-family:'Yuji Syuku',serif;font-size:2.5em;margin:0;color:#fff;text-shadow:0 0 20px #d4af37;">IMOBILIÁRIA</h1><p style="margin:0;color:#bfc6e6;font-style:italic;">${transType.toUpperCase()} DE PROPRIEDADE</p></div><div class="combat-icon-deco" style="bottom:-35px;--custom-kanji:'家';border-color:#d4af37;"></div></div><div class="combat-content" style="padding:50px 30px 30px 30px;display:block;"><section style="display:block;width:100%;"><h2 style="font-family:'Yuji Syuku',serif;font-size:2.2em;color:#f2e3a1;border-bottom:2px solid #d4af37;padding-bottom:10px;margin-bottom:20px;">${prop}</h2><div class="info-grid-2col" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-bottom:30px;"><div class="info-card" style="border-left-color:#d4af37;"><div class="info-title">CLIENTE</div><div class="info-content">${jog} (${per})</div></div><div class="info-card" style="border-left-color:#d4af37;"><div class="info-title">LOCALIZAÇÃO</div><div class="info-content">${loc}</div></div><div class="info-card" style="border-left-color:#d4af37;"><div class="info-title">TIPO</div><div class="info-content">${imovelName}</div></div><div class="info-card" style="border-left-color:#ffd700;"><div class="info-title">TOTAL</div><div class="info-value" style="color:#ffd700;font-size:1.2em;font-weight:bold;">¥ ${totalVal}</div></div></div><h3 style="font-family:'Yuji Syuku',serif;font-size:1.6em;color:#e7e9ff;margin-bottom:15px;border-bottom:1px solid rgba(255,255,255,0.1);padding-bottom:5px;">DIVISÃO DE TÓPICOS</h3><div class="quest-item" style="background:rgba(212,175,55,0.05);border:1px solid rgba(255,255,255,0.08);padding:20px;border-radius:8px;margin-bottom:20px;"><div class="quest-content" style="color:#bfc6e6;">${topicListHTML}</div></div><h3 style="font-family:'Yuji Syuku',serif;font-size:1.6em;color:#e7e9ff;margin-bottom:15px;border-bottom:1px solid rgba(255,255,255,0.1);padding-bottom:5px;">ALOCAÇÃO DE INSTALAÇÕES</h3><div class="quest-item" style="background:rgba(212,175,55,0.05);border:1px solid rgba(255,255,255,0.08);padding:20px;border-radius:8px;"><div class="quest-content" style="color:#bfc6e6;line-height:1.6;">${modHTML}</div></div><br>${spoilers}</section></div></div>`;
          document.getElementById('output-code').value = pedidoBase.replace(/\n/g, '').replace(/\s\s+/g, ' ');
      }

      imovelSelect.addEventListener('change', updateTopicsInputs);
      topicsList.addEventListener('input', updateModuleSelects);
      document.getElementById('form-container').addEventListener('input', updateLogic);
      updateTopicsInputs();
      new ResizeObserver(() => window.parent.postMessage({ frameHeight: document.body.scrollHeight }, '*')).observe(document.body);
      document.getElementById('copy-btn').addEventListener('click', function() {
          const area = document.getElementById('output-code'); area.select(); document.execCommand('copy');
          this.textContent = 'Copiado!'; setTimeout(() => this.textContent = 'Copiar Pedido Completo', 2000);
      });
    });
  </script>
</body>
</html>
