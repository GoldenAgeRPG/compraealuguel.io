<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de Compra de Imóveis - JJK RPG</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=Roboto+Mono:wght@400;700&family=Yuji+Syuku&display=swap" rel="stylesheet">
   
  <style>
    :root {
      --bg: #0c0c1a;
      --panel: #13141c;
      --muted: #bfc6e6;
      --accent1: #2979ff;
      --highlight: #82b1ff;
      --text: #e7e9ff;
      --ui: 'Inter', system-ui, sans-serif;
      --title: 'Yuji Syuku', serif;
      --mono: 'Roboto Mono', monospace;
      --glass: rgba(255, 255, 255, 0.03);
      --success: #00e091;
      --gold: #ffd700;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--ui);
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: 20px;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .container { max-width: 900px; margin: 0 auto; }
    
    #form-container {
      background: var(--panel);
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 20px;
      margin-bottom: 20px;
    }
    #output-container {
      background: var(--panel);
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 20px;
    }
    fieldset {
      border: 1px solid var(--glass);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
    }
    legend {
      font-family: var(--title);
      font-size: 1.5em;
      color: var(--highlight);
      padding: 0 10px;
      margin-left: 10px;
    }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .input-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
    
    label { 
      font-weight: 500; font-size: 13px; color: var(--muted); text-transform: uppercase; font-family: var(--mono); 
    }
    input[type="text"], input[type="url"], textarea, select {
      background: var(--bg);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      padding: 10px;
      color: var(--text);
      font-family: var(--ui);
      font-size: 14px;
      width: 100%;
    }
    select { font-family: var(--mono); }
    textarea { min-height: 80px; resize: vertical; }
    
    .note { font-size: 12px; color: var(--muted); opacity: 0.8; margin-top: 5px; }

    .modules-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 15px;
        margin-top: 10px;
    }
    .module-card {
        background: var(--glass);
        padding: 12px;
        border-radius: 8px;
        border: 1px solid transparent;
        transition: 0.3s;
    }
    .module-card.active {
        border-color: var(--accent1);
        background: rgba(41, 121, 255, 0.05);
    }
    .module-header {
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
    }
    .module-header input { width: auto; }
    .module-info { flex-grow: 1; display: flex; justify-content: space-between; font-size: 14px; }
    .module-desc-input {
        margin-top: 10px;
        display: none;
    }
    .module-card.active .module-desc-input { display: block; }

    .category-label { 
        margin-top: 25px; 
        color: var(--accent1); 
        font-weight: bold; 
        font-size: 1em; 
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 5px;
        font-family: var(--title);
    }

    .total-box {
        background: rgba(41, 121, 255, 0.1);
        border: 1px solid var(--accent1);
        padding: 15px;
        border-radius: 8px;
        text-align: center;
        margin-top: 20px;
    }
    .total-value { font-family: var(--mono); font-size: 1.5em; color: var(--gold); }

    #output-code {
      width: 100%; height: 200px; background: var(--bg);
      border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; padding: 15px;
      color: var(--muted); font-family: var(--mono); font-size: 12px; resize: vertical; margin-bottom: 10px;
    }
    #copy-btn {
      width: 100%; padding: 12px; border: none; border-radius: 8px; background: var(--success);
      color: var(--panel); font-size: 1em; font-family: var(--ui); font-weight: 700;
      cursor: pointer; transition: 0.2s;
    }
    #copy-btn:hover { background: #00ffaa; }

    @media (min-width: 600px) {
        .modules-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

  <div class="container">
    <div id="form-container">
      <fieldset>
        <legend>Dados do Comprador</legend>
        <div class="grid-2">
          <div class="input-group">
            <label for="f-jogador">Jogador</label>
            <input type="text" id="f-jogador" placeholder="Seu nome de usuário">
          </div>
          <div class="input-group">
            <label for="f-personagem">Personagem</label>
            <input type="text" id="f-personagem" placeholder="Nome do personagem">
          </div>
        </div>
      </fieldset>

      <fieldset>
        <legend>Propriedade</legend>
        <div class="grid-2">
          <div class="input-group">
            <label for="f-transacao">Tipo de Transação</label>
            <select id="f-transacao">
              <option value="compra">Compra Definitiva</option>
              <option value="aluguel">Aluguel Semanal</option>
            </select>
          </div>
          <div class="input-group">
            <label for="f-imovel">Tipo de Imóvel</label>
            <select id="f-imovel">
              <option value="esconderijo" data-buy="500000" data-rent="20000">Esconderijo (1 Slot)</option>
              <option value="apartamento" data-buy="5000000" data-rent="100000">Apartamento (3 Slots)</option>
              <option value="residencia" data-buy="20000000" data-rent="400000">Residência (6 Slots)</option>
              <option value="complexo" data-buy="100000000" data-rent="1000000">Complexo (12 Slots)</option>
            </select>
            <div id="slot-info" class="note">Slots: 1</div>
          </div>
        </div>

        <div class="grid-2">
            <div class="input-group">
              <label for="f-nome-prop">Nome da Propriedade (Flavor)</label>
              <input type="text" id="f-nome-prop" placeholder="Ex: Mansão Zen'in">
            </div>
            <div class="input-group">
              <label for="f-local">Localização</label>
              <input type="text" id="f-local" placeholder="Bairro, Ponto de Referência">
            </div>
        </div>
      </fieldset>
      
      <fieldset>
        <legend>Módulos & Instalações</legend>
        <div id="modules-container" class="modules-grid"></div>
        <div class="input-group" style="margin-top: 20px;">
            <label for="f-obs">Observações Adicionais</label>
            <textarea id="f-obs" placeholder="Detalhes extras..."></textarea>
        </div>
      </fieldset>

      <div class="total-box">
          <h4>VALOR TOTAL A PAGAR</h4>
          <div id="total-display" class="total-value">¥ 0</div>
      </div>
    </div>

    <div id="output-container">
      <textarea id="output-code" readonly></textarea>
      <button id="copy-btn">Copiar Código</button>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const modulesData = {
          "Essenciais & Conforto": [
              { name: "Quarto Simples", cost: 50000 }, { name: "Suíte Master", cost: 300000 },
              { name: "Cozinha Básica", cost: 100000 }, { name: "Cozinha Gourmet", cost: 400000 },
              { name: "Onsen (Termas)", cost: 1500000 }
          ],
          "Treino & Estudos": [
              { name: "Dojo Marcial", cost: 400000 }, { name: "Sala de Meditação", cost: 400000 },
              { name: "Biblioteca Oculta", cost: 300000 }, { name: "Sala de Estudos", cost: 200000 },
              { name: "Campo de Tiro", cost: 600000 }, { name: "Jardim de Ervas", cost: 300000 }
          ],
          "Ofício & Suporte": [
              { name: "Oficina / Ateliê", cost: 600000 }, { name: "Laboratório", cost: 1000000 },
              { name: "Enfermaria", cost: 800000 }, { name: "Garagem", cost: 200000 },
              { name: "Gerador Autônomo", cost: 500000 }
          ],
          "Segurança & Contenção": [
              { name: "Arsenal Seguro", cost: 200000 }, { name: "Sala de Vigilância", cost: 400000 },
              { name: "Quarto do Pânico", cost: 1000000 }, { name: "Rota de Fuga", cost: 300000 }
          ]
      };

      const container = document.getElementById('modules-container');
      for (const [category, items] of Object.entries(modulesData)) {
          const catHeader = document.createElement('div');
          catHeader.className = 'category-label';
          catHeader.textContent = category;
          container.appendChild(catHeader);
          items.forEach((mod, idx) => {
              const card = document.createElement('div');
              card.className = 'module-card';
              card.innerHTML = `<div class="module-header"><input type="checkbox" class="mod-check" data-name="${mod.name}" data-cost="${mod.cost}"><div class="module-info"><span>${mod.name}</span><span style="color:var(--gold)">¥${mod.cost.toLocaleString('pt-BR')}</span></div></div><div class="module-desc-input"><input type="text" class="mod-desc" placeholder="Descreva este local..."></div>`;
              const checkbox = card.querySelector('.mod-check');
              checkbox.addEventListener('change', () => { card.classList.toggle('active', checkbox.checked); updateLogic(); });
              container.appendChild(card);
          });
      }

      function updateLogic() {
          const imovel = document.getElementById('f-imovel');
          const trans = document.getElementById('f-transacao');
          const isAluguel = trans.value === 'aluguel';
          const propertyCost = parseInt(isAluguel ? imovel.options[imovel.selectedIndex].getAttribute('data-rent') : imovel.options[imovel.selectedIndex].getAttribute('data-buy'));
          let modulesCost = 0, modHTML = "";
          document.querySelectorAll('.module-card').forEach(card => {
              const cb = card.querySelector('.mod-check'), desc = card.querySelector('.mod-desc').value.trim();
              if (cb.checked) { modulesCost += parseInt(cb.getAttribute('data-cost')); modHTML += `• <b>${cb.getAttribute('data-name')}</b>${desc ? ': ' + desc : ''}<br>`; }
          });
          const total = propertyCost + modulesCost;
          document.getElementById('total-display').textContent = "¥ " + total.toLocaleString('pt-BR');
          generateCode(imovel.options[imovel.selectedIndex].text, trans.value, modHTML, total.toLocaleString('pt-BR'));
          sendHeight();
      }

      function generateCode(imovelName, transType, modHTML, totalVal) {
          const jog = document.getElementById('f-jogador').value || '---', per = document.getElementById('f-personagem').value || '---', prop = document.getElementById('f-nome-prop').value || '---', loc = document.getElementById('f-local').value || '---', obs = document.getElementById('f-obs').value;
          let content = modHTML || 'Nenhum módulo.';
          if(obs) content += `<br><br><div class="quest-special"><b>NOTAS ADICIONAIS:</b><br>${obs}</div>`;
          
          const cssLink = `<link href="https://gaaaaaaaaabs.github.io/goldenagerepositor.io/combate.css" rel="stylesheet" type="text/css">`;
          const template = `${cssLink}<div class="combat-container" style="display:block;width:100%;"><div class="combat-header" style="min-height:120px;padding:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;"><div class="combat-header-content" style="position:relative;z-index:5;"><h1 style="font-family:'Yuji Syuku',serif;font-size:2.5em;margin:0;color:#fff;text-shadow:0 0 20px #9b00ff;">IMOBILIÁRIA</h1><p style="margin:0;color:#bfc6e6;font-style:italic;">${transType.toUpperCase()} DE PROPRIEDADE</p></div><div class="combat-icon-deco" style="bottom:-35px;--custom-kanji:'家';"></div></div><div class="combat-content" style="padding:50px 30px 30px 30px;display:block;"><section style="display:block;width:100%;"><h2 style="font-family:'Yuji Syuku',serif;font-size:2.2em;color:#c48fff;border-bottom:2px solid #9b00ff;padding-bottom:10px;margin-bottom:20px;">${prop}</h2><div class="info-grid-2col" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-bottom:30px;"><div class="info-card"><div class="info-title">CLIENTE</div><div class="info-content">${jog} (${per})</div></div><div class="info-card"><div class="info-title">LOCALIZAÇÃO</div><div class="info-content">${loc}</div></div><div class="info-card"><div class="info-title">TIPO DE IMÓVEL</div><div class="info-content">${imovelName}</div></div><div class="info-card" style="border-left-color:#ffd700;"><div class="info-title">VALOR TOTAL</div><div class="info-value" style="color:#ffd700;font-size:1.2em;font-weight:bold;">¥ ${totalVal}</div></div></div><h3 style="font-family:'Yuji Syuku',serif;font-size:1.6em;color:#e7e9ff;margin-bottom:15px;border-bottom:1px solid rgba(255,255,255,0.1);padding-bottom:5px;">MÓDULOS E INSTALAÇÕES</h3><div class="quest-item" style="background:rgba(155,0,255,0.05);border:1px solid rgba(255,255,255,0.08);padding:20px;border-radius:8px;"><div class="quest-content" style="color:#bfc6e6;line-height:1.6;">${content}</div></div></section></div></div>`;
          document.getElementById('output-code').value = template.replace(/\n/g, '').replace(/\s\s+/g, ' ');
      }

      function sendHeight() { window.parent.postMessage({ frameHeight: document.body.scrollHeight }, '*'); }
      document.getElementById('form-container').addEventListener('input', updateLogic);
      window.addEventListener('load', sendHeight);
      new ResizeObserver(sendHeight).observe(document.body);
      document.getElementById('copy-btn').addEventListener('click', function() {
          const area = document.getElementById('output-code'); area.select(); document.execCommand('copy');
          this.textContent = 'Copiado!'; setTimeout(() => this.textContent = 'Copiar Código', 2000);
      });
      updateLogic();
    });
  </script>
</body>
</html>
