<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de Compra de Imóveis - JJK RPG</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=Roboto+Mono:wght@400;700&family=Yuji+Syuku&display=swap" rel="stylesheet">
   
  <style>
    :root {
      --bg: #0c0c1a;
      --panel: #13141c;
      --muted: #bfc6e6;
      --accent1: #2979ff;
      --highlight: #82b1ff;
      --text: #e7e9ff;
      --ui: 'Inter', system-ui, sans-serif;
      --title: 'Yuji Syuku', serif;
      --mono: 'Roboto Mono', monospace;
      --glass: rgba(255, 255, 255, 0.03);
      --success: #00e091;
      --gold: #ffd700;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--ui);
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: 20px;
      min-height: 100vh;
      overflow-x: hidden; /* Evita scrolls horizontais chatos */
    }
    .container { max-width: 900px; margin: 0 auto; }
    
    #form-container {
      background: var(--panel);
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 20px;
      margin-bottom: 20px;
    }
    #output-container {
      background: var(--panel);
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 20px;
    }
    fieldset {
      border: 1px solid var(--glass);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
    }
    legend {
      font-family: var(--title);
      font-size: 1.5em;
      color: var(--highlight);
      padding: 0 10px;
      margin-left: 10px;
    }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .input-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
    
    label { 
      font-weight: 500; font-size: 13px; color: var(--muted); text-transform: uppercase; font-family: var(--mono); 
    }
    input[type="text"], input[type="url"], textarea, select {
      background: var(--bg);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      padding: 10px;
      color: var(--text);
      font-family: var(--ui);
      font-size: 14px;
      width: 100%;
    }
    select { font-family: var(--mono); }
    textarea { min-height: 80px; resize: vertical; }
    
    .note { font-size: 12px; color: var(--muted); opacity: 0.8; margin-top: 5px; }

    /* Módulos */
    .modules-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 15px;
        margin-top: 10px;
    }
    .module-card {
        background: var(--glass);
        padding: 12px;
        border-radius: 8px;
        border: 1px solid transparent;
        transition: 0.3s;
    }
    .module-card.active {
        border-color: var(--accent1);
        background: rgba(41, 121, 255, 0.05);
    }
    .module-header {
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
    }
    .module-header input { width: auto; }
    .module-info { flex-grow: 1; display: flex; justify-content: space-between; font-size: 14px; }
    .module-desc-input {
        margin-top: 10px;
        display: none;
    }
    .module-card.active .module-desc-input { display: block; }

    .category-label { 
        margin-top: 25px; 
        color: var(--accent1); 
        font-weight: bold; 
        font-size: 1em; 
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 5px;
        font-family: var(--title);
    }

    .total-box {
        background: rgba(41, 121, 255, 0.1);
        border: 1px solid var(--accent1);
        padding: 15px;
        border-radius: 8px;
        text-align: center;
        margin-top: 20px;
    }
    .total-value { font-family: var(--mono); font-size: 1.5em; color: var(--gold); }

    #output-code {
      width: 100%; height: 200px; background: var(--bg);
      border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; padding: 15px;
      color: var(--muted); font-family: var(--mono); font-size: 12px; resize: vertical; margin-bottom: 10px;
    }
    #copy-btn {
      width: 100%; padding: 12px; border: none; border-radius: 8px; background: var(--success);
      color: var(--panel); font-size: 1em; font-family: var(--ui); font-weight: 700;
      cursor: pointer; transition: 0.2s;
    }
    #copy-btn:hover { background: #00ffaa; }

    @media (min-width: 600px) {
        .modules-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

  <div class="container">
    <div id="form-container">
      <fieldset>
        <legend>Dados do Comprador</legend>
        <div class="grid-2">
          <div class="input-group">
            <label for="f-jogador">Jogador</label>
            <input type="text" id="f-jogador" placeholder="Seu nome de usuário">
          </div>
          <div class="input-group">
            <label for="f-personagem">Personagem</label>
            <input type="text" id="f-personagem" placeholder="Nome do personagem">
          </div>
        </div>
      </fieldset>

      <fieldset>
        <legend>Propriedade</legend>
        <div class="grid-2">
          <div class="input-group">
            <label for="f-transacao">Tipo de Transação</label>
            <select id="f-transacao">
              <option value="compra">Compra Definitiva</option>
              <option value="aluguel">Aluguel Semanal</option>
            </select>
          </div>
          <div class="input-group">
            <label for="f-imovel">Tipo de Imóvel</label>
            <select id="f-imovel">
              <option value="esconderijo" data-buy="500000" data-rent="20000">Esconderijo (1 Slot)</option>
              <option value="apartamento" data-buy="5000000" data-rent="100000">Apartamento (3 Slots)</option>
              <option value="residencia" data-buy="20000000" data-rent="400000">Residência (6 Slots)</option>
              <option value="complexo" data-buy="100000000" data-rent="1000000">Complexo (12 Slots)</option>
            </select>
            <div id="slot-info" class="note">Slots: 1</div>
          </div>
        </div>

        <div class="grid-2">
            <div class="input-group">
              <label for="f-nome-prop">Nome da Propriedade (Flavor)</label>
              <input type="text" id="f-nome-prop" placeholder="Ex: Mansão Zen'in">
            </div>
            <div class="input-group">
              <label for="f-local">Localização</label>
              <input type="text" id="f-local" placeholder="Bairro, Ponto de Referência">
            </div>
        </div>
      </fieldset>
      
      <fieldset>
        <legend>Módulos & Instalações</legend>
        <div class="note">Selecione os módulos e descreva-os brevemente.</div>
        <div id="modules-container" class="modules-grid"></div>

        <div class="input-group" style="margin-top: 20px;">
            <label for="f-obs">Observações Adicionais</label>
            <textarea id="f-obs" placeholder="Algum detalhe extra que não coube nos módulos?"></textarea>
        </div>
      </fieldset>

      <div class="total-box">
          <h4>VALOR TOTAL A PAGAR</h4>
          <div id="total-display" class="total-value">¥ 0</div>
      </div>
    </div>

    <div id="output-container">
      <textarea id="output-code" readonly></textarea>
      <button id="copy-btn">Copiar Código</button>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      
      const modulesData = {
          "Essenciais & Conforto": [
              { name: "Quarto Simples", cost: 50000 },
              { name: "Suíte Master", cost: 300000 },
              { name: "Cozinha Básica", cost: 100000 },
              { name: "Cozinha Gourmet", cost: 400000 },
              { name: "Onsen (Termas)", cost: 1500000 }
          ],
          "Treino & Estudos": [
              { name: "Dojo Marcial", cost: 400000 },
              { name: "Sala de Meditação", cost: 400000 },
              { name: "Biblioteca Oculta", cost: 300000 },
              { name: "Sala de Estudos", cost: 200000 },
              { name: "Campo de Tiro", cost: 600000 },
              { name: "Jardim de Ervas", cost: 300000 }
          ],
          "Ofício & Suporte": [
              { name: "Oficina / Ateliê", cost: 600000 },
              { name: "Laboratório", cost: 1000000 },
              { name: "Enfermaria", cost: 800000 },
              { name: "Garagem", cost: 200000 },
              { name: "Gerador Autônomo", cost: 500000 }
          ],
          "Segurança & Contenção": [
              { name: "Arsenal Seguro", cost: 200000 },
              { name: "Sala de Vigilância", cost: 400000 },
              { name: "Quarto do Pânico", cost: 1000000 },
              { name: "Rota de Fuga", cost: 300000 }
          ]
      };

      const container = document.getElementById('modules-container');
      
      for (const [category, items] of Object.entries(modulesData)) {
          const catHeader = document.createElement('div');
          catHeader.className = 'category-label';
          catHeader.textContent = category;
          container.appendChild(catHeader);

          items.forEach((mod, idx) => {
              const card = document.createElement('div');
              card.className = 'module-card';
              card.innerHTML = `
                  <div class="module-header">
                      <input type="checkbox" class="mod-check" id="mod-${category.replace(/\s+/g, '')}-${idx}" data-name="${mod.name}" data-cost="${mod.cost}">
                      <div class="module-info">
                          <span>${mod.name}</span>
                          <span style="color:var(--gold)">¥${mod.cost.toLocaleString('pt-BR')}</span>
                      </div>
                  </div>
                  <div class="module-desc-input">
                      <input type="text" class="mod-desc" placeholder="Descreva este local...">
                  </div>
              `;
              
              const checkbox = card.querySelector('.mod-check');
              checkbox.addEventListener('change', () => {
                  card.classList.toggle('active', checkbox.checked);
                  updateLogic();
              });

              container.appendChild(card);
          });
      }

      const imovelSelect = document.getElementById('f-imovel');
      const transacaoSelect = document.getElementById('f-transacao');
      const totalDisplay = document.getElementById('total-display');
      const outputArea = document.getElementById('output-code');
      const slotInfo = document.getElementById('slot-info');

      function updateLogic() {
          const selectedImovel = imovelSelect.options[imovelSelect.selectedIndex];
          const isAluguel = transacaoSelect.value === 'aluguel';
          const propertyCost = parseInt(isAluguel ? selectedImovel.getAttribute('data-rent') : selectedImovel.getAttribute('data-buy'));
          
          let modulesCost = 0;
          let selectedModulesHTML = "";

          document.querySelectorAll('.module-card').forEach(card => {
              const cb = card.querySelector('.mod-check');
              const desc = card.querySelector('.mod-desc').value.trim();
              if (cb.checked) {
                  modulesCost += parseInt(cb.getAttribute('data-cost'));
                  selectedModulesHTML += `• <b>${cb.getAttribute('data-name')}</b>${desc ? ': ' + desc : ''}<br>`;
              }
          });

          const total = propertyCost + modulesCost;
          totalDisplay.textContent = "¥ " + total.toLocaleString('pt-BR');
          
          const slotsMap = { "esconderijo": 1, "apartamento": 3, "residencia": 6, "complexo": 12 };
          slotInfo.textContent = `Slots do Imóvel: ${slotsMap[imovelSelect.value]}`;

          generateCode(selectedImovel.text, isAluguel ? "Aluguel" : "Compra", selectedModulesHTML, total.toLocaleString('pt-BR'));
      }

      function generateCode(imovelName, transacaoType, modulesHTML, totalValue) {
          const jogador = document.getElementById('f-jogador').value || '---';
          const personagem = document.getElementById('f-personagem').value || '---';
          const nomeProp = document.getElementById('f-nome-prop').value || '---';
          const local = document.getElementById('f-local').value || '---';
          const obs = document.getElementById('f-obs').value;

          let modContent = modulesHTML || 'Nenhum módulo selecionado.';
          if(obs) modContent += `<br><b>Notas Gerais:</b> ${obs}`;

          const template = `<link href="https://gaaaaaaaaabs.github.io/goldenagerepositor.io/combate.css" rel="stylesheet" type="text/css"><div class="avaliacao-request"><div class="avaliacao-header"><div class="avaliacao-title"><h3>IMOBILIÁRIA - ${transacaoType.toUpperCase()}</h3><span class="avaliacao-status">Processando</span></div></div><div class="avaliacao-content"><div class="avaliacao-field"><span class="avaliacao-label">Cliente:</span><span class="avaliacao-value">${jogador} (${personagem})</span></div><div class="avaliacao-field"><span class="avaliacao-label">Tipo:</span><span class="avaliacao-value">${transacaoType} de Imóvel</span></div><div class="avaliacao-field"><span class="avaliacao-label">Propriedade:</span><span class="avaliacao-value">${imovelName}</span></div><div class="avaliacao-field"><span class="avaliacao-label">Nome/Local:</span><span class="avaliacao-value">${nomeProp} — ${local}</span></div><div class="avaliacao-field full-width"><span class="avaliacao-label">Módulos Detalhados:</span><div class="avaliacao-value" style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 4px; border-left: 3px solid #2979ff; margin-top:5px;">${modContent}</div></div><div class="avaliacao-footer"><div class="avaliacao-master" style="font-size: 1.2em;"><b>Total a Pagar:</b> <span style="color: #ffd700;">¥ ${totalValue}</span></div></div></div></div>`;

          outputArea.value = template;
      }

      // --- CÓDIGO DE REDIMENSIONAMENTO ---
      function sendHeight() {
          const height = document.body.scrollHeight;
          window.parent.postMessage({ frameHeight: height }, '*');
      }

      // Escuta mudanças em qualquer input para avisar o fórum que o tamanho mudou
      document.getElementById('form-container').addEventListener('input', () => {
          updateLogic();
          sendHeight();
      });

      // Envia a altura inicial após carregar tudo
      window.addEventListener('load', sendHeight);
      
      // Observador para mudanças automáticas de layout
      const ro = new ResizeObserver(() => sendHeight());
      ro.observe(document.body);

      document.getElementById('copy-btn').addEventListener('click', function() {
          outputArea.select();
          document.execCommand('copy');
          this.textContent = 'Copiado!';
          setTimeout(() => this.textContent = 'Copiar Código', 2000);
      });

      updateLogic();
    });
  </script>
</body>
</html>
