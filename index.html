<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de Propriedades Zenin - JJK RPG</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=Roboto+Mono:wght@400;700&family=Yuji+Syuku&family=Cinzel:wght@700&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0c0c1a; --panel: #13141c; --muted: #bfc6e6; --accent1: #d4af37; --highlight: #f2e3a1; --text: #e7e9ff; --ui: 'Inter', system-ui, sans-serif; --title: 'Yuji Syuku', serif; --mono: 'Roboto Mono', monospace; --glass: rgba(255, 255, 255, 0.03); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--ui); background-color: var(--bg); color: var(--text); line-height: 1.6; padding: 20px; min-height: 100vh; overflow-x: hidden; }
    .container { max-width: 900px; margin: 0 auto; }
    #form-container { background: var(--panel); border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.1); padding: 20px; margin-bottom: 20px; }
    #output-container { background: var(--panel); border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.1); padding: 20px; }
    fieldset { border: 1px solid var(--glass); border-radius: 8px; padding: 15px; margin-bottom: 20px; }
    legend { font-family: var(--title); font-size: 1.5em; color: var(--accent1); padding: 0 10px; margin-left: 10px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .input-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
    label { font-weight: 500; font-size: 11px; color: var(--muted); text-transform: uppercase; font-family: var(--mono); }
    input, textarea, select { background: var(--bg); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 6px; padding: 10px; color: var(--text); font-family: var(--ui); font-size: 14px; width: 100%; }
    textarea { min-height: 80px; resize: vertical; }
    .subf-area { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 6px; }
    .modules-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 10px; }
    .module-card { background: var(--glass); padding: 15px; border-radius: 8px; border: 1px solid transparent; transition: 0.3s; }
    .module-card.active { border-color: var(--accent1); background: rgba(212, 175, 55, 0.05); }
    .module-header { display: flex; align-items: center; gap: 10px; cursor: pointer; margin-bottom: 10px; }
    .module-header input { width: auto; }
    .module-info { flex-grow: 1; display: flex; justify-content: space-between; font-size: 14px; }
    .module-fields { display: none; flex-direction: column; gap: 10px; margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; }
    .module-card.active .module-fields { display: flex; }
    .category-label { margin-top: 25px; color: var(--accent1); font-weight: bold; font-size: 0.9em; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; font-family: var(--title); text-transform: uppercase; }
    .total-box { background: rgba(212, 175, 55, 0.1); border: 1px solid var(--accent1); padding: 15px; border-radius: 8px; text-align: center; margin-top: 20px; }
    .total-value { font-family: var(--mono); font-size: 1.5em; color: var(--accent1); }
    #output-code { width: 100%; height: 150px; background: var(--bg); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; padding: 15px; color: var(--muted); font-family: var(--mono); font-size: 12px; resize: vertical; margin-bottom: 10px; }
    #copy-btn { width: 100%; padding: 12px; border: none; border-radius: 8px; background: var(--accent1); color: #000; font-size: 1em; font-family: var(--ui); font-weight: 700; cursor: pointer; transition: 0.2s; }
    #copy-btn:hover { background: #fff; }
    @media (max-width: 600px) { .subf-area { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <div id="form-container">
      <fieldset>
        <legend>Dados do Comprador</legend>
        <div class="grid-2">
          <div class="input-group"><label>Jogador</label><input type="text" id="f-jogador" placeholder="Nick"></div>
          <div class="input-group"><label>Personagem</label><input type="text" id="f-personagem" placeholder="Nome"></div>
        </div>
      </fieldset>
      <fieldset>
        <legend>Propriedade</legend>
        <div class="grid-2">
          <div class="input-group">
            <label>Transação</label>
            <select id="f-transacao"><option value="compra">Compra Definitiva</option><option value="aluguel">Aluguel Semanal</option></select>
          </div>
          <div class="input-group">
            <label>Tipo de Imóvel</label>
            <select id="f-imovel">
              <option value="esconderijo" data-buy="500000" data-rent="20000" data-subs="0" data-type="topico">Esconderijo (1 Tópico Único)</option>
              <option value="apartamento" data-buy="5000000" data-rent="100000" data-subs="1" data-type="subforum">Apartamento (1 Subfórum - 3 Tópicos)</option>
              <option value="residencia" data-buy="20000000" data-rent="400000" data-subs="2" data-type="subforum">Residência (2 Subfóruns - 6 Tópicos)</option>
              <option value="complexo" data-buy="100000000" data-rent="1000000" data-subs="4" data-type="subforum">Complexo (4 Subfóruns - 12 Tópicos)</option>
            </select>
          </div>
        </div>
        <div class="grid-2">
            <div class="input-group"><label>Nome da Propriedade</label><input type="text" id="f-nome-prop" placeholder="Ex: Mansão Zen'in"></div>
            <div class="input-group"><label>Localização Geral</label><input type="text" id="f-local" placeholder="Ex: Shibuya"></div>
        </div>
        <div id="subforums-setup">
          <label id="label-subf" style="margin-top:10px; display:block;">Nomear Subfóruns:</label>
          <div id="subf-list" class="subf-area"></div>
        </div>
      </fieldset>
      <fieldset>
        <legend>Módulos & Instalações</legend>
        <div id="modules-container" class="modules-grid"></div>
        <div class="input-group" style="margin-top: 20px;">
            <label>Observações Adicionais</label>
            <textarea id="f-obs" placeholder="Notas para o mestre..."></textarea>
        </div>
      </fieldset>
      <div class="total-box"><h4>TOTAL</h4><div id="total-display" class="total-value">¥ 0</div></div>
    </div>
    <div id="output-container">
      <textarea id="output-code" readonly></textarea>
      <button id="copy-btn">Copiar Pedido Completo</button>
    </div>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const modulesData = {
        "Essenciais & Conforto": [
          { name: "Quarto Simples", cost: 50000, kanji: "寝", sub: "Repouso Básico" },
          { name: "Suíte Master", cost: 300000, kanji: "室", sub: "Aposentos de Luxo" },
          { name: "Cozinha Básica", cost: 100000, kanji: "食", sub: "Refeitório" },
          { name: "Cozinha Gourmet", cost: 400000, kanji: "宴", sub: "Culinária de Elite" },
          { name: "Onsen", cost: 1500000, kanji: "湯", sub: "Purificação Termal" }
        ],
        "Treino & Estudos": [
          { name: "Dojo Marcial", cost: 400000, kanji: "武", sub: "Aperfeiçoamento Físico" },
          { name: "Sala de Meditação", cost: 400000, kanji: "禅", sub: "Foco Espiritual" },
          { name: "Biblioteca Oculta", cost: 300000, kanji: "書", sub: "Conhecimento Proibido" },
          { name: "Sala de Estudos", cost: 200000, kanji: "学", sub: "Intelecto Acadêmico" },
          { name: "Campo de Tiro", cost: 600000, kanji: "標", sub: "Precisão Balística" },
          { name: "Jardim de Ervas", cost: 300000, kanji: "草", sub: "Cultivo Botânico" }
        ],
        "Ofício & Suporte": [
          { name: "Oficina / Ateliê", cost: 600000, kanji: "工", sub: "Criação de Ferramentas" },
          { name: "Laboratório", cost: 1000000, kanji: "薬", sub: "Alquimia e Pesquisa" },
          { name: "Enfermaria", cost: 800000, kanji: "癒", sub: "Tratamento de Feridas" },
          { name: "Garagem", cost: 200000, kanji: "車", sub: "Logística Veicular" },
          { name: "Gerador Autônomo", cost: 500000, kanji: "電", sub: "Independência Energética" }
        ],
        "Segurança & Contenção": [
          { name: "Arsenal Seguro", cost: 200000, kanji: "兵", sub: "Estoque de Armamento" },
          { name: "Sala de Vigilância", cost: 400000, kanji: "眼", sub: "Monitoramento Constante" },
          { name: "Quarto do Pânico", cost: 1000000, kanji: "守", sub: "Fortaleza Final" },
          { name: "Rota de Fuga", cost: 300000, kanji: "遁", sub: "Evasão Estratégica" }
        ]
      };

      const container = document.getElementById('modules-container');
      const subfList = document.getElementById('subf-list');
      const imovelSelect = document.getElementById('f-imovel');

      function updateSubfInputs() {
        const opt = imovelSelect.options[imovelSelect.selectedIndex];
        const subsCount = parseInt(opt.getAttribute('data-subs'));
        const type = opt.getAttribute('data-type');
        subfList.innerHTML = '';
        if(type === 'topico') {
          document.getElementById('label-subf').style.display = 'none';
        } else {
          document.getElementById('label-subf').style.display = 'block';
          for(let i=1; i<=subsCount; i++) {
            const div = document.createElement('div');
            div.className = 'input-group';
            div.innerHTML = `<label>Subfórum ${i}</label><input type="text" class="subf-name-input" placeholder="Ex: Ala Norte" value="Subfórum ${i}">`;
            subfList.appendChild(div);
          }
        }
        updateModuleAloc();
      }

      function updateModuleAloc() {
        const subInputs = document.querySelectorAll('.subf-name-input');
        const selects = document.querySelectorAll('.mod-aloc-select');
        selects.forEach(sel => {
          const current = sel.value;
          sel.innerHTML = '';
          if(subInputs.length === 0) {
            const o = document.createElement('option'); o.value = "Tópico Único"; o.textContent = "Tópico Único"; sel.appendChild(o);
          } else {
            subInputs.forEach(si => {
              for(let t=1; t<=3; t++) {
                const o = document.createElement('option');
                const val = `${si.value} (Tópico ${t})`;
                o.value = val; o.textContent = val; sel.appendChild(o);
              }
            });
          }
          sel.value = current || sel.options[0]?.value;
        });
      }

      for (const [category, items] of Object.entries(modulesData)) {
          const catHeader = document.createElement('div');
          catHeader.className = 'category-label';
          catHeader.textContent = category;
          container.appendChild(catHeader);
          items.forEach((mod, idx) => {
              const card = document.createElement('div');
              card.className = 'module-card';
              card.innerHTML = `
                <div class="module-header">
                  <input type="checkbox" class="mod-check" data-name="${mod.name}" data-cost="${mod.cost}" data-kanji="${mod.kanji}" data-sub-def="${mod.sub}">
                  <div class="module-info"><span>${mod.name}</span><span>¥${mod.cost.toLocaleString('pt-BR')}</span></div>
                </div>
                <div class="module-fields">
                  <label>Alocar em:</label><select class="mod-aloc-select"></select>
                  <input type="text" class="mod-sub" placeholder="Subtítulo">
                  <input type="text" class="mod-img" placeholder="URL da Imagem">
                  <textarea class="mod-desc" placeholder="Descrição narrativa..."></textarea>
                </div>`;
              card.querySelector('.mod-check').addEventListener('change', function() {
                  card.classList.toggle('active', this.checked);
                  updateLogic();
              });
              container.appendChild(card);
          });
      }

      function updateLogic() {
          const opt = imovelSelect.options[imovelSelect.selectedIndex];
          const trans = document.getElementById('f-transacao');
          const cost = parseInt(trans.value === 'aluguel' ? opt.getAttribute('data-rent') : opt.getAttribute('data-buy'));
          let mCost = 0, mHTML = "", sHTML = "";
          
          document.querySelectorAll('.module-card.active').forEach(card => {
              const cb = card.querySelector('.mod-check');
              const name = cb.getAttribute('data-name');
              const sub = card.querySelector('.mod-sub').value || cb.getAttribute('data-sub-def');
              const img = card.querySelector('.mod-img').value || 'https://i.imgur.com/YUtp3HN.png';
              const desc = card.querySelector('.mod-desc').value || 'Sem descrição.';
              const aloc = card.querySelector('.mod-aloc-select').value;
              
              mCost += parseInt(cb.getAttribute('data-cost'));
              mHTML += `• <b>${name}</b> [${aloc}]<br>`;
              sHTML += `[spoiler="CÓDIGO: ${name.toUpperCase()} (${aloc.toUpperCase()})"][code]<link href="https://goldenagerpg.github.io/templates.io/moradias.css" rel="stylesheet" type="text/css"><div class="zenin-wrapper"><div class="zenin-header"><img src="${img}" class="zenin-header-img"><div class="zenin-title-overlay"><h1 class="zenin-title">${name}</h1><div class="zenin-subtitle">${sub}</div></div></div><div class="zenin-content"><div class="zenin-kanji">${cb.getAttribute('data-kanji')}</div><div class="zenin-desc"><p>${desc}</p></div></div></div>[/code][/spoiler]`;
          });
          
          document.getElementById('total-display').textContent = "¥ " + (cost + mCost).toLocaleString('pt-BR');
          generateCode(opt.text, trans.value, mHTML, (cost + mCost).toLocaleString('pt-BR'), sHTML);
      }

      function generateCode(imovelName, transType, mHTML, totalVal, spoilers) {
          const jog = document.getElementById('f-jogador').value || '---', per = document.getElementById('f-personagem').value || '---', prop = document.getElementById('f-nome-prop').value || '---', loc = document.getElementById('f-local').value || '---', obs = document.getElementById('f-obs').value;
          let struct = "";
          document.querySelectorAll('.subf-name-input').forEach(si => struct += `• Subfórum: ${si.value} (Contém 3 Tópicos)<br>`);
          if(!struct) struct = "• Tópico Único<br>";
          
          const pedidoBase = `<link href="https://gaaaaaaaaabs.github.io/goldenagerepositor.io/combate.css" rel="stylesheet" type="text/css"><div class="combat-container" style="display:block;width:100%;"><div class="combat-header" style="min-height:120px;padding:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;"><div class="combat-header-content" style="position:relative;z-index:5;"><h1 style="font-family:'Yuji Syuku',serif;font-size:2.5em;margin:0;color:#fff;text-shadow:0 0 20px #d4af37;">IMOBILIÁRIA</h1><p style="margin:0;color:#bfc6e6;font-style:italic;">${transType.toUpperCase()} DE PROPRIEDADE</p></div><div class="combat-icon-deco" style="bottom:-35px;--custom-kanji:'家';border-color:#d4af37;"></div></div><div class="combat-content" style="padding:50px 30px 30px 30px;display:block;"><section style="display:block;width:100%;"><h2 style="font-family:'Yuji Syuku',serif;font-size:2.2em;color:#f2e3a1;border-bottom:2px solid #d4af37;padding-bottom:10px;margin-bottom:20px;">${prop}</h2><div class="info-grid-2col" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-bottom:30px;"><div class="info-card" style="border-left-color:#d4af37;"><div class="info-title">CLIENTE</div><div class="info-content">${jog} (${per})</div></div><div class="info-card" style="border-left-color:#d4af37;"><div class="info-title">LOCALIZAÇÃO</div><div class="info-content">${loc}</div></div><div class="info-card" style="border-left-color:#d4af37;"><div class="info-title">TIPO</div><div class="info-content">${imovelName}</div></div><div class="info-card" style="border-left-color:#ffd700;"><div class="info-title">TOTAL</div><div class="info-value" style="color:#ffd700;font-size:1.2em;font-weight:bold;">¥ ${totalVal}</div></div></div><h3 style="font-family:'Yuji Syuku',serif;font-size:1.6em;color:#e7e9ff;margin-bottom:15px;border-bottom:1px solid rgba(255,255,255,0.1);padding-bottom:5px;">ESTRUTURA SOLICITADA</h3><div class="quest-item" style="background:rgba(212,175,55,0.05);border:1px solid rgba(255,255,255,0.08);padding:20px;border-radius:8px;margin-bottom:20px;"><div class="quest-content" style="color:#bfc6e6;">${struct}</div></div><h3 style="font-family:'Yuji Syuku',serif;font-size:1.6em;color:#e7e9ff;margin-bottom:15px;border-bottom:1px solid rgba(255,255,255,0.1);padding-bottom:5px;">ALOCAÇÃO DE MÓDULOS</h3><div class="quest-item" style="background:rgba(212,175,55,0.05);border:1px solid rgba(255,255,255,0.08);padding:20px;border-radius:8px;"><div class="quest-content" style="color:#bfc6e6;line-height:1.6;">${mHTML}</div></div><br>${spoilers}</section></div></div>`;
          document.getElementById('output-code').value = pedidoBase.replace(/\n/g, '').replace(/\s\s+/g, ' ');
      }

      imovelSelect.addEventListener('change', updateSubfInputs);
      subfList.addEventListener('input', updateModuleAloc);
      document.getElementById('form-container').addEventListener('input', updateLogic);
      updateSubfInputs();
      new ResizeObserver(() => window.parent.postMessage({ frameHeight: document.body.scrollHeight }, '*')).observe(document.body);
      document.getElementById('copy-btn').addEventListener('click', function() {
          const area = document.getElementById('output-code'); area.select(); document.execCommand('copy');
          this.textContent = 'Copiado!'; setTimeout(() => this.textContent = 'Copiar Pedido Completo', 2000);
      });
    });
  </script>
</body>
</html>
